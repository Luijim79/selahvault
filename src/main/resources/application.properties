spring.thymeleaf.cache=false
spring.application.name=SelahVault

# Conexion a la base de datos MySQL
# La base de datos debe llamarse selahvaultdb
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/selahvaultdb?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=110312
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA / Hibernate
# update permite que Spring cree o actualice las tablas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto local de la aplicacion
server.port=8080
