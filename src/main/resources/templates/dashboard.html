<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SelahVault - Mis contraseñas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function copiarTexto(texto) {
            navigator.clipboard.writeText(texto);
            alert("Copiado correctamente");
        }
    </script>
</head>
<body class="p-4">
<div class="container">

    <div class="navbar-selah mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="d-flex align-items-center">
            <img src="/img/logo.png" alt="Logo" class="logo-header" onerror="this.style.display='none'">
            <div>
                <h2>SelahVault</h2>
                <p>Tus contraseñas en un lugar seguro</p>
            </div>
        </div>

        <div class="d-flex gap-2">
            <a th:href="@{/passwords/new}" class="btn btn-light">Nueva contraseña</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-danger">Salir</button>
            </form>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-lg-6">
            <div class="card section-card p-3">
                <h5 class="page-title">Generar contraseña</h5>
                <form th:action="@{/passwords/generate}" method="post" class="row g-2">
                    <div class="col-md-3">
                        <input type="number" name="longitud" class="form-control" value="12" min="4" max="64">
                    </div>
                    <div class="col-md-3">
                        <input type="checkbox" name="mayusculas"> Mayúsculas
                    </div>
                    <div class="col-md-3">
                        <input type="checkbox" name="minusculas" checked> Minúsculas
                    </div>
                    <div class="col-md-3">
                        <input type="checkbox" name="numeros" checked> Números
                    </div>
                    <div class="col-md-6">
                        <input type="checkbox" name="simbolos"> Símbolos
                    </div>
                    <div class="col-md-6">
                        <button class="btn btn-primary w-100">Generar</button>
                    </div>
                </form>

                <div th:if="${passwordGenerada}" class="alert alert-info mt-3 mb-0">
                    Contraseña generada: <strong th:text="${passwordGenerada}"></strong>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card section-card p-3">
                <h5 class="page-title">Evaluar fortaleza</h5>
                <form th:action="@{/passwords/evaluate}" method="post" class="row g-2">
                    <div class="col-md-9">
                        <input type="text" name="password" class="form-control" placeholder="Escribe una contraseña">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-warning w-100">Evaluar</button>
                    </div>
                </form>

                <div th:if="${fortaleza}" class="alert alert-secondary mt-3 mb-0">
                    Fortaleza detectada: <strong th:text="${fortaleza}"></strong>
                </div>
            </div>
        </div>
    </div>

    <div class="table-wrapper p-3">
        <h5 class="page-title mb-3">Mis registros</h5>
        <table class="table table-bordered table-striped mb-0">
            <thead>
            <tr>
                <th>Título</th>
                <th>Usuario</th>
                <th>Contraseña</th>
                <th>URL</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${entries}">
                <td th:text="${e.titulo}"></td>
                <td th:text="${e.usuarioSitio}"></td>
                <td th:text="${e.contrasena}"></td>
                <td th:text="${e.url}"></td>
                <td class="d-flex flex-wrap gap-1">
                    <a th:href="@{/passwords/edit/{id}(id=${e.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/passwords/delete/{id}(id=${e.id})}" class="btn btn-sm btn-danger">Eliminar</a>
                    <button type="button" class="btn btn-sm btn-info"
                            th:attr="onclick=|copiarTexto('${e.usuarioSitio}')|">Copiar user</button>
                    <button type="button" class="btn btn-sm btn-secondary"
                            th:attr="onclick=|copiarTexto('${e.contrasena}')|">Copiar contraseña</button>
                    <button type="button" class="btn btn-sm btn-success"
                            th:attr="onclick=|copiarTexto('${e.url}')|">Copiar URL</button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(entries)}">
                <td colspan="5" class="text-center text-muted">Aún no tienes contraseñas guardadas.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
