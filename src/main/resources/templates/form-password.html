<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelahVault - Guardar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/selahvault-polish.css}">
</head>
<body>
<div class="form-page">
    <div class="glass-card form-card-modern">
        <div class="form-header">
            <div class="brand-icon large">🔐</div>
            <div>
                <p class="eyebrow">SelahVault</p>
                <h2 th:text="${entry.id == null ? 'Nuevo registro' : 'Editar registro'}">Guardar contraseña</h2>
                <span>La contraseña se guarda cifrada en la base de datos.</span>
            </div>
        </div>

        <form th:action="@{/passwords/save}" th:object="${entry}" method="post" class="modern-form">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Título del servicio</label>
                <input type="text" th:field="*{titulo}" class="form-control" placeholder="Ej: Gmail, Facebook, Banco">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Usuario del sitio</label>
                <input type="text" th:field="*{usuarioSitio}" class="form-control" placeholder="Ej: correo o nombre de usuario">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('usuarioSitio')}" th:errors="*{usuarioSitio}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-action">
                    <input type="text" th:field="*{contrasena}" th:value="${entry.contrasena}" id="contrasena" class="form-control" placeholder="Escribe la contraseña">
                    <button type="button" onclick="togglePassword('contrasena', this)">Ocultar</button>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">URL</label>
                <input type="text" th:field="*{url}" class="form-control" placeholder="https://ejemplo.com">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('url')}" th:errors="*{url}"></div>
            </div>

            <div class="form-actions">
                <button class="btn-gradient">Guardar cambios</button>
                <a th:href="@{/passwords}" class="btn-outline-glow">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePassword(id, button) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            button.innerText = "Ocultar";
        } else {
            input.type = "password";
            button.innerText = "Ver";
        }
    }
</script>
</body>
</html>
