<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SelahVault - Guardar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="p-4">
<div class="container col-lg-7">
    <div class="card main-card p-4">
        <div class="text-center mb-4">
            <div class="logo-circle">🔐</div>
            <div class="brand-title">SelahVault</div>
            <div class="brand-subtitle">Guardar o editar contraseña</div>
        </div>

        <form th:action="@{/passwords/save}" th:object="${entry}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" th:field="*{titulo}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" th:field="*{usuarioSitio}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('usuarioSitio')}" th:errors="*{usuarioSitio}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="text" th:field="*{contrasena}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">URL</label>
                <input type="text" th:field="*{url}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('url')}" th:errors="*{url}"></div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary">Guardar</button>
                <a th:href="@{/passwords}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
