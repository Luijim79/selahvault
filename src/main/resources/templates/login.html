<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SelahVault - Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="card auth-card p-4 col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div class="logo-circle">🔒</div>
            <div class="brand-title">SelahVault</div>
            <div class="brand-subtitle">Tus contraseñas en un lugar seguro</div>
            <div class="brand-verse mt-2">“Encomienda a Jehová tu camino, y confía en Él.” Salmo 37:5</div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrectos
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            Sesión cerrada correctamente
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Entrar</button>
        </form>

        <a th:href="@{/register}" class="btn btn-link mt-3">Crear cuenta</a>
    </div>
</div>
</body>
</html>
