<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelahVault - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/selahvault-polish.css}">
</head>
<body class="register-page">
<div class="auth-wrapper">
    <div class="glass-card auth-card-modern">
        <div class="text-center mb-4">
            <div class="brand-icon mx-auto">🔐</div>
            <h2>Crear cuenta</h2>
            <p>Registra tu usuario para empezar a usar SelahVault.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" class="modern-form">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" maxlength="100" placeholder="Crea un usuario" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña de acceso</label>
                <input type="password" name="password" class="form-control" placeholder="Crea una contraseña segura" required>
            </div>

            <button class="btn-gradient w-100">Registrar</button>
        </form>

        <a th:href="@{/login}" class="auth-link">Volver al inicio de sesión</a>
    </div>
</div>
</body>
</html>
