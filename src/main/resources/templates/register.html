<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SelahVault - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="card auth-card p-4 col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div class="logo-circle">✝</div>
            <div class="brand-title">SelahVault</div>
            <div class="brand-subtitle">Crea tu cuenta segura</div>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" maxlength="100" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña de acceso</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Registrar</button>
        </form>

        <a th:href="@{/login}" class="btn btn-link mt-3">Volver al inicio de sesión</a>
    </div>
</div>
</body>
</html>
